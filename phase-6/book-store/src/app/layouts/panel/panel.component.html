<div class="table-wrapper modal-backdrop">
  <button (click)="changeModalStatus()" class="add-book__btn">Add book</button>

  @if (isModalOpen) {
  <div class="modal-overlay">
    <div class="modal">
      <div class="add-book-header">
        <h2>Add Book</h2>
        <button class="modal-close" (click)="changeModalStatus()">
          <svg
            width="20px"
            height="20px"
            viewBox="0 0 24 24"
            fill="#ffffff"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M5.29289 5.29289C5.68342 4.90237 6.31658 4.90237 6.70711 5.29289L12 10.5858L17.2929 5.29289C17.6834 4.90237 18.3166 4.90237 18.7071 5.29289C19.0976 5.68342 19.0976 6.31658 18.7071 6.70711L13.4142 12L18.7071 17.2929C19.0976 17.6834 19.0976 18.3166 18.7071 18.7071C18.3166 19.0976 17.6834 19.0976 17.2929 18.7071L12 13.4142L6.70711 18.7071C6.31658 19.0976 5.68342 19.0976 5.29289 18.7071C4.90237 18.3166 4.90237 17.6834 5.29289 17.2929L10.5858 12L5.29289 6.70711C4.90237 6.31658 4.90237 5.68342 5.29289 5.29289Z"
              fill="#ffffff"
            />
          </svg>
        </button>
      </div>
      <form (submit)="addBook()" class="add-book__form">
        <label>
          <span class="add-book__form__label">Name:</span>
          <input type="text" [(ngModel)]="name" name="name" />
        </label>
        <label>
          <span class="add-book__form__label">Genre:</span>
          <input type="text" [(ngModel)]="genre" name="genre" />
        </label>
        <label>
          <span class="add-book__form__label">Price:</span>
          <input type="number" [(ngModel)]="price" name="price" />
        </label>
        <div class="modal-actions">
          <button type="button" (click)="changeModalStatus()">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>
  }

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Genre</th>
          <th>Price</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        @for (book of booksService.getAllBooks; track book.id) {
        <tr>
          <td>{{ book.id }}</td>
          <td>{{ book.name }}</td>

          <td (click)="removeBook(book.id)" style="text-align: center">
