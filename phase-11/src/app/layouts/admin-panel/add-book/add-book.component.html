<app-modal (close)="onClose()">
  <div class="modal-book-header">
    <h2>Add Book</h2>
    <button class="modal-close" (click)="onClose()">
      <app-close-icon />
    </button>
  </div>
  <form (submit)="addBook()" class="modal-book__form">
    <label>
      <span class="modal-book__form__label">Name:</span>
      <input type="text" [(ngModel)]="name" name="name"/>
    </label>
    <label>
      <span class="modal-book__form__label">Image (link):</span>
      <input type="text" [(ngModel)]="image" name="image"/>
    </label>
    <label>
      <span class="modal-book__form__label">Genre:</span>
      <input type="text" [(ngModel)]="genre" name="genre"/>
    </label>
    <label>
      <span class="modal-book__form__label">Author:</span>
      <input type="text" [(ngModel)]="author" name="author"/>
    </label>
    <label>
      <span class="modal-book__form__label">Publish date:</span>
      <input type="date" [(ngModel)]="publishDate" name="publish-date"/>
    </label>
    <label>
      <span class="modal-book__form__label">Price:</span>
      <input type="number" [(ngModel)]="price" name="price"/>
    </label>
    <div class="modal-actions">
      <button type="button" (click)="onClose()">Cancel</button>
      <button type="submit">Save</button>
    </div>
  </form>
</app-modal>
